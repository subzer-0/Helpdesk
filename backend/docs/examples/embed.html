<!--
  HelpDesk complaint form — copy this block into any page on your website.
  Customize the `HELPDESK_ENDPOINT` value below. No backend required.

  Fields: name, email, contact, body + hidden honeypot.
  Submits to POST /api/complaints/public and shows the returned ticket ID.
-->
<style>
  .helpdesk-complaint-form { max-width: 480px; font-family: system-ui, sans-serif; }
  .helpdesk-complaint-form label { display: block; margin: 12px 0 4px; font-size: 14px; font-weight: 500; }
  .helpdesk-complaint-form input,
  .helpdesk-complaint-form textarea {
    width: 100%; padding: 10px 12px; font-size: 14px;
    border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box;
  }
  .helpdesk-complaint-form textarea { min-height: 120px; resize: vertical; }
  .helpdesk-complaint-form button {
    margin-top: 16px; padding: 10px 16px; font-size: 14px; font-weight: 600;
    background: #2447f0; color: white; border: 0; border-radius: 8px; cursor: pointer;
  }
  .helpdesk-complaint-form button[disabled] { opacity: 0.6; cursor: not-allowed; }
  .helpdesk-complaint-form .hp { position: absolute; left: -10000px; top: auto; width: 1px; height: 1px; overflow: hidden; }
  .helpdesk-complaint-form .status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; }
  .helpdesk-complaint-form .status.ok { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
  .helpdesk-complaint-form .status.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
</style>

<form class="helpdesk-complaint-form" id="helpdesk-complaint-form" novalidate>
  <label for="hd-name">Full name</label>
  <input id="hd-name" name="name" type="text" autocomplete="name" required maxlength="120" />

  <label for="hd-email">Email address</label>
  <input id="hd-email" name="email" type="email" autocomplete="email" required />

  <label for="hd-contact">Phone or other contact</label>
  <input id="hd-contact" name="contact" type="text" autocomplete="tel" required maxlength="60" />

  <label for="hd-body">Describe the issue</label>
  <textarea id="hd-body" name="body" required minlength="10" maxlength="10000"></textarea>

  <!-- Honeypot — humans don't see or tab to this; bots often fill it. -->
  <div class="hp" aria-hidden="true">
    <label>Website <input name="website" type="text" tabindex="-1" autocomplete="off" /></label>
  </div>

  <button type="submit" id="hd-submit">Submit complaint</button>
  <div id="hd-status" class="status" hidden></div>
</form>

<script>
  (function () {
    // TODO: replace with your helpdesk host
    var HELPDESK_ENDPOINT = "https://helpdesk.example.com/api/complaints/public";

    var form = document.getElementById("helpdesk-complaint-form");
    var btn = document.getElementById("hd-submit");
    var status = document.getElementById("hd-status");

    function show(ok, msg) {
      status.hidden = false;
      status.className = "status " + (ok ? "ok" : "err");
      status.textContent = msg;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      btn.disabled = true;
      status.hidden = true;

      var data = {
        name:    form.name.value.trim(),
        email:   form.email.value.trim(),
        contact: form.contact.value.trim(),
        body:    form.body.value.trim(),
        website: form.website.value, // honeypot
      };

      try {
        var res = await fetch(HELPDESK_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        var json = await res.json().catch(function () { return {}; });
        if (!res.ok) throw new Error((json.error && json.error.message) || "Submission failed.");
        show(true, "Thanks — your complaint is logged as ticket " + json.ticketId + ". We will reply by email.");
        form.reset();
      } catch (err) {
        show(false, err.message || "Could not submit. Please try again.");
      } finally {
        btn.disabled = false;
      }
    });
  })();
</script>
